<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Council</title>
    <style>
      body {
        box-sizing: border-box;
        color: #172033;
        font: 14px/1.45 system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        width: 360px;
      }

      h1 { font-size: 20px; margin: 0 0 12px; }
      label { display: block; font-weight: 600; margin-bottom: 6px; }
      textarea { box-sizing: border-box; min-height: 100px; padding: 8px; resize: vertical; width: 100%; }
      input[type="number"] { box-sizing: border-box; padding: 8px; width: 100%; }
      button { margin-top: 10px; padding: 8px 12px; }
      .field { margin-bottom: 12px; }
      .status-block { margin: 12px 0; }
      .status-line { margin: 0 0 4px; min-height: 20px; }
      .status-label { color: #5b6475; font-size: 12px; font-weight: 600; margin: 0 0 2px; }
      #verdict { background: #f4f6f9; border-radius: 8px; min-height: 48px; padding: 12px; white-space: pre-wrap; }
      #transcript-details { margin-top: 12px; }
      #transcript-details summary { cursor: pointer; font-weight: 600; }
      .transcript-entry { border-top: 1px solid #d8dee8; margin-top: 10px; padding-top: 10px; }
      .transcript-entry:first-child { border-top: 0; margin-top: 0; padding-top: 0; }
      .transcript-heading { font-size: 12px; font-weight: 700; margin: 0 0 6px; }
      .transcript-text { margin: 0; white-space: pre-wrap; }
      .error { color: #b42318; }
    </style>
  </head>
  <body>
    <h1>Council</h1>
    <div class="field">
      <label for="question">Question</label>
      <textarea id="question" placeholder="What should the council discuss?"></textarea>
    </div>
    <div class="field">
      <label for="rounds">Review rounds</label>
      <input id="rounds" type="number" min="1" step="1" value="1">
    </div>
    <button id="start" type="button">Start</button>
    <div class="status-block">
      <p class="status-label">Draftor</p>
      <p id="draftor-status" class="status-line" aria-live="polite">Ready.</p>
      <p class="status-label">Reviewer</p>
      <p id="reviewer-status" class="status-line" aria-live="polite">Waiting.</p>
    </div>
    <section id="verdict" aria-label="Verdict">No verdict yet.</section>
    <details id="transcript-details">
      <summary>Review history</summary>
      <div id="transcript">No review history yet.</div>
    </details>
    <script src="popup.js"></script>
  </body>
</html>
